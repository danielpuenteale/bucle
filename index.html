<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for</title>
  </head>
  <body>
    <h1>for</h1>
    <script>
      let resultado = 0;
      for (let m = 1; m <= 10; m++) {
        resultado = 3 * m;
        console.log("3 x " + m + " = " + resultado);
      }
    </script>
  </body>
</html>
