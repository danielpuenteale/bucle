<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculardora</title>
    <style>
      .calculadora {
        width: 300px;
        height: 500px;
        background-color: grey;
      }
      .numeros {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 40px;
        background-color: grey;
      }
      .num {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 50px;
        height: 50px;
        background-color: aliceblue;
        border: 1px solid black;
        margin-top: 60px;
      }
      .divsNumeros {
        display: flex;
        justify-content: center;
        background-color: rgb(255, 0, 0);
      }
    </style>
  </head>
  <body>
    <h1>calculadora</h1>
    <div class="calculadora">
      <div class="numeros"></div>
    </div>
    <script>
      let divsNumeros = "";
      for (let cont = 1; cont <= 9; cont++) {
        divsNumeros =
          divsNumeros + `<div class= "num" id=${cont}> ${cont}</div>`;
      }

      document.querySelector(".numeros").innerHTML = divsNumeros;
    </script>
  </body>
</html>
